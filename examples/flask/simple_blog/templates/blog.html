<!DOCTYPE html>
<html>
<head><title>Simple GemStone Blog</title></head>
<body>
  <h1>Simple GemStone Blog</h1>
  <nav>
    <a href="{{ url_for('posts') }}">All Posts</a> |
    <a href="{{ url_for('new_post') }}">New Post</a>
  </nav>
  <hr>
  {% if posts %}
    {% for post in posts %}
      <h2><a href="{{ url_for('show_post', post_id=post.id) }}">{{ post.title }}</a></h2>
      <p>{{ post.text }}</p>
      {% if post.tags %}
        <p>Tags:
          {% for tag in post.tags %}
            <span style="background:#eee;padding:2px 6px;border-radius:3px">{{ tag }}</span>
          {% endfor %}
        </p>
      {% endif %}
      <hr>
    {% endfor %}
  {% else %}
    <p>No posts yet. <a href="{{ url_for('new_post') }}">Write one!</a></p>
  {% endif %}
</body>
</html>
