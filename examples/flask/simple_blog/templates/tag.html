<!DOCTYPE html>
<html>
<head><title>Tag: {{ tag.name }}</title></head>
<body>
  <h1>Posts tagged "{{ tag.name }}"</h1>
  {% if posts %}
    {% for post in posts %}
      <h2><a href="{{ url_for('show_post', post_id=post.id) }}">{{ post.title }}</a></h2>
      <p>{{ post.text[:200] }}{% if post.text|length > 200 %}…{% endif %}</p>
      <hr>
    {% endfor %}
  {% else %}
    <p>No posts with this tag.</p>
  {% endif %}
  <p><a href="{{ url_for('posts') }}">Back to all posts</a></p>
</body>
</html>
