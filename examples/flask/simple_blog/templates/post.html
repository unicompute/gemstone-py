<!DOCTYPE html>
<html>
<head><title>{{ post.title }}</title></head>
<body>
  <h1>{{ post.title }}</h1>
  <p>{{ post.text }}</p>
  {% if post.tags %}
    <p>Tags:
      {% for tag in post.tags %}
        <span style="background:#eee;padding:2px 6px;border-radius:3px">{{ tag }}</span>
      {% endfor %}
    </p>
  {% endif %}
  <p><a href="{{ url_for('posts') }}">Back to all posts</a></p>
</body>
</html>
