{% extends "base.html" %}

{% block title %}Posts{% endblock %}

{% block content %}
<h1>Listing posts</h1>
<table border="1" cellpadding="4">
  <tr><th>Name</th><th>Title</th><th>Content</th><th></th><th></th><th></th></tr>
  {% for post in posts %}
  <tr>
    <td>{{ post.name }}</td>
    <td>{{ post.title }}</td>
    <td>{{ post.content|truncatechars:80 }}</td>
    <td class="actions"><a href="{% url 'post_detail' post.pk %}">Show</a></td>
    <td class="actions"><a href="{% url 'post_edit' post.pk %}">Edit</a></td>
    <td class="actions">
      <form method="post" action="{% url 'post_delete' post.pk %}" style="display:inline"
            onsubmit="return confirm('Are you sure?')">
        {% csrf_token %}
        <input type="submit" value="Destroy">
      </form>
    </td>
  </tr>
  {% endfor %}
</table>
<br><a href="{% url 'post_new' %}">New Post</a>
{% endblock %}
