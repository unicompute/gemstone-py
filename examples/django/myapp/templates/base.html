<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>{% block title %}Myapp{% endblock %}</title>
  <style>
    body { font-family: Georgia, serif; margin: 2rem auto; max-width: 960px; line-height: 1.4; }
    nav { margin-bottom: 1.5rem; }
    nav a { margin-right: 1rem; }
    table { border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid #bbb; padding: 0.45rem 0.6rem; text-align: left; vertical-align: top; }
    th { background: #f2f2f2; }
    .messages { list-style: none; padding: 0; }
    .messages li { color: #1f6b36; }
    .error-box { border: 1px solid #b30000; background: #fff2f2; padding: 0.75rem; }
    .actions { white-space: nowrap; }
    textarea { min-height: 10rem; width: 100%; }
    input[type="text"] { width: 100%; max-width: 28rem; }
  </style>
</head>
<body>
  <nav>
    <a href="{% url 'home' %}">Home</a>
    <a href="{% url 'post_list' %}">Posts</a>
    <a href="{% url 'post_new' %}">New Post</a>
  </nav>
  {% if messages %}
    <ul class="messages">
      {% for msg in messages %}<li>{{ msg }}</li>{% endfor %}
    </ul>
  {% endif %}
  {% block content %}{% endblock %}
</body>
</html>
