<svg xmlns="http://www.w3.org/2000/svg" width="980" height="620" viewBox="0 0 980 620">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fdf7ec"/>
      <stop offset="1" stop-color="#f2e8d4"/>
    </linearGradient>
    <filter id="drop" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#3c2f2f" flood-opacity="0.15"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#3c2f2f"/>
    </marker>
  </defs>

  <rect width="980" height="620" fill="url(#bgGrad)"/>

  <text x="50" y="58" font-family="Georgia, serif" font-size="30" font-weight="700" fill="#3c2f2f">Cartoon: The Stone Club Bouncer</text>

  <rect x="50" y="116" width="880" height="500" rx="24" fill="#fffaf2" stroke="#3c2f2f" stroke-width="4" filter="url(#drop)"/>

  <rect x="110" y="132" width="236" height="32" rx="12" fill="#eef8e7" stroke="#5ca313" stroke-width="2"/>
  <text x="228" y="153" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#417802">GemStone gatekeeper</text>
  <image x="108" y="170" width="240" height="240" href="emerald-logo.svg" preserveAspectRatio="xMidYMid meet"/>
  <rect x="118" y="418" width="220" height="38" rx="12" fill="#eef8e7" stroke="#5ca313" stroke-width="2"/>
  <text x="228" y="442" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="700" fill="#417802">No config, no entry.</text>

  <rect x="360" y="246" width="204" height="142" rx="20" fill="#dceeff" stroke="#295d8a" stroke-width="4"/>
  <text x="462" y="298" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="700" fill="#17344f">Credentials?</text>
  <text x="462" y="338" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#17344f">Transaction plan?</text>
  <text x="462" y="370" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#557390">Show me your config.</text>

  <rect x="598" y="128" width="236" height="32" rx="12" fill="#e7eef8" stroke="#3d6b9d" stroke-width="2"/>
  <text x="716" y="149" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#2d5378">Python wants a session</text>

  <g transform="translate(600 160)">
    <rect x="0" y="0" width="230" height="250" rx="22" fill="#ffffff" stroke="#3b4c5b" stroke-width="4"/>
    <rect x="0" y="0" width="230" height="54" rx="22" fill="#3d6b9d"/>
    <rect x="0" y="28" width="230" height="26" fill="#3d6b9d"/>
    <circle cx="32" cy="27" r="7" fill="#ffd1d1"/>
    <circle cx="56" cy="27" r="7" fill="#ffe4a6"/>
    <circle cx="80" cy="27" r="7" fill="#cdeccf"/>
    <rect x="42" y="82" width="146" height="34" rx="12" fill="#e6eef9"/>
    <text x="115" y="105" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#2d5378">Python service</text>
    <rect x="42" y="130" width="116" height="18" rx="9" fill="#bcd5ee"/>
    <rect x="42" y="164" width="170" height="18" rx="9" fill="#c9def2"/>
    <rect x="42" y="190" width="86" height="42" rx="12" fill="#e4eef9" stroke="#3d6b9d" stroke-width="3"/>
    <text x="85" y="209" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#2d5378">API</text>
    <text x="85" y="225" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#6f88a6">stable</text>
  </g>

  <path d="M322 316 L360 316" fill="none" stroke="#3c2f2f" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M564 316 L600 316" fill="none" stroke="#3c2f2f" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrow)"/>

  <rect x="300" y="462" width="520" height="92" rx="16" fill="#fff5e8" stroke="#c6ab92" stroke-width="2.5"/>
  <text x="560" y="500" text-anchor="middle" font-family="Georgia, serif" font-size="18" font-style="italic" fill="#6b5140">"No defaults, no nonsense."</text>
  <text x="560" y="530" text-anchor="middle" font-family="Georgia, serif" font-size="18" font-style="italic" fill="#6b5140">"Also please stop forgetting to commit."</text>

  <rect x="96" y="540" width="196" height="58" rx="14" fill="#dceeff" stroke="#295d8a" stroke-width="2.5"/>
  <text x="194" y="576" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="700" fill="#17344f">GemStone</text>

  <rect x="596" y="540" width="208" height="58" rx="16" fill="#ffe4bf" stroke="#b07022" stroke-width="2.5"/>
  <text x="700" y="576" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="700" fill="#8b5716">Python app</text>
</svg>
