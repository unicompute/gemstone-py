<svg xmlns="http://www.w3.org/2000/svg" width="1300" height="860" viewBox="0 0 1300 860">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fdfaf4"/>
      <stop offset="1" stop-color="#f3ead8"/>
    </linearGradient>
    <filter id="drop" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#32261f" flood-opacity="0.13"/>
    </filter>
    <marker id="arr" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 1 L11 6 L0 11 Z" fill="#32261f"/>
    </marker>
  </defs>

  <rect width="1300" height="860" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="650" y="62" text-anchor="middle" font-family="Georgia, serif" font-size="34" font-weight="700" fill="#32261f">Cookbook Recipe Flow</text>
  <text x="650" y="96" text-anchor="middle" font-family="Georgia, serif" font-size="17" fill="#68594d">From config to production: how the 21 cookbook recipes connect.</text>

  <!-- ── Top row: main pipeline  y=150..290 ── -->

  <!-- Configure  x=40..240 -->
  <rect x="40" y="150" width="200" height="140" rx="20" fill="#dceeff" stroke="#255f88" stroke-width="3" filter="url(#drop)"/>
  <rect x="40" y="150" width="200" height="40" rx="20" fill="#255f88"/>
  <rect x="40" y="170" width="200" height="20" fill="#255f88"/>
  <text x="140" y="178" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="700" fill="#fff">Configure</text>
  <text x="140" y="218" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#17344f">GemStoneConfig</text>
  <text x="140" y="242" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#17344f">from_env()</text>
  <text x="140" y="272" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#4a7ab5" font-style="italic">recipes 1</text>

  <!-- Connect  x=290..490 -->
  <rect x="290" y="150" width="200" height="140" rx="20" fill="#ffe7cc" stroke="#9b5f1e" stroke-width="3" filter="url(#drop)"/>
  <rect x="290" y="150" width="200" height="40" rx="20" fill="#9b5f1e"/>
  <rect x="290" y="170" width="200" height="20" fill="#9b5f1e"/>
  <text x="390" y="178" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="700" fill="#fff">Connect</text>
  <text x="390" y="218" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#5b3410">GemStoneSession</text>
  <text x="390" y="242" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#5b3410">or session_scope()</text>
  <text x="390" y="272" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#c47a30" font-style="italic">recipes 2–4</text>

  <!-- Persist  x=540..740 -->
  <rect x="540" y="150" width="200" height="140" rx="20" fill="#e1f6df" stroke="#2c6b3e" stroke-width="3" filter="url(#drop)"/>
  <rect x="540" y="150" width="200" height="40" rx="20" fill="#2c6b3e"/>
  <rect x="540" y="170" width="200" height="20" fill="#2c6b3e"/>
  <text x="640" y="178" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="700" fill="#fff">Persist</text>
  <text x="640" y="215" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#1b4829">root · store</text>
  <text x="640" y="239" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#1b4829">query · log</text>
  <text x="640" y="272" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#3a8050" font-style="italic">recipes 5–10</text>

  <!-- Share  x=790..990 -->
  <rect x="790" y="150" width="200" height="140" rx="20" fill="#eadfff" stroke="#56337f" stroke-width="3" filter="url(#drop)"/>
  <rect x="790" y="150" width="200" height="40" rx="20" fill="#56337f"/>
  <rect x="790" y="170" width="200" height="20" fill="#56337f"/>
  <text x="890" y="178" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="700" fill="#fff">Share</text>
  <text x="890" y="215" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#3b2554">locks · queues</text>
  <text x="890" y="239" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#3b2554">counters</text>
  <text x="890" y="272" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#7a52a0" font-style="italic">recipes 9–10, 19</text>

  <!-- Verify  x=1040..1240 -->
  <rect x="1040" y="150" width="200" height="140" rx="20" fill="#fff8dc" stroke="#b0860a" stroke-width="3" filter="url(#drop)"/>
  <rect x="1040" y="150" width="200" height="40" rx="20" fill="#b0860a"/>
  <rect x="1040" y="170" width="200" height="20" fill="#b0860a"/>
  <text x="1140" y="178" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="700" fill="#fff">Verify</text>
  <text x="1140" y="215" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#7a5800">api_contract</text>
  <text x="1140" y="239" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#7a5800">live tests</text>
  <text x="1140" y="272" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#b08010" font-style="italic">recipes 17–18</text>

  <!-- ── Top row arrows ── -->
  <line x1="242" y1="220" x2="288" y2="220" stroke="#32261f" stroke-width="2.5" marker-end="url(#arr)"/>
  <line x1="492" y1="220" x2="538" y2="220" stroke="#32261f" stroke-width="2.5" marker-end="url(#arr)"/>
  <line x1="742" y1="220" x2="788" y2="220" stroke="#32261f" stroke-width="2.5" marker-end="url(#arr)"/>
  <line x1="992" y1="220" x2="1038" y2="220" stroke="#32261f" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- ── Bottom row  y=470..610 ── -->

  <!-- Expose  x=220..440 -->
  <rect x="220" y="470" width="220" height="140" rx="20" fill="#fff1d8" stroke="#9b5f1e" stroke-width="3" filter="url(#drop)"/>
  <rect x="220" y="470" width="220" height="40" rx="20" fill="#9b5f1e"/>
  <rect x="220" y="490" width="220" height="20" fill="#9b5f1e"/>
  <text x="330" y="498" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="700" fill="#fff">Expose</text>
  <text x="330" y="538" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#5b3410">Flask request</text>
  <text x="330" y="562" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#5b3410">sessions</text>
  <text x="330" y="592" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#c47a30" font-style="italic">recipes 11–13</text>

  <!-- Measure  x=510..730 -->
  <rect x="510" y="470" width="220" height="140" rx="20" fill="#fce8ff" stroke="#7a3f8a" stroke-width="3" filter="url(#drop)"/>
  <rect x="510" y="470" width="220" height="40" rx="20" fill="#7a3f8a"/>
  <rect x="510" y="490" width="220" height="20" fill="#7a3f8a"/>
  <text x="620" y="498" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="700" fill="#fff">Measure</text>
  <text x="620" y="538" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#5a1f7a">benchmarks</text>
  <text x="620" y="562" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#5a1f7a">compare · baseline</text>
  <text x="620" y="592" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#9a4ab0" font-style="italic">recipes 14–16</text>

  <!-- Recover  x=800..1020 -->
  <rect x="800" y="470" width="220" height="140" rx="20" fill="#ffe3e3" stroke="#8a2f2f" stroke-width="3" filter="url(#drop)"/>
  <rect x="800" y="470" width="220" height="40" rx="20" fill="#8a2f2f"/>
  <rect x="800" y="490" width="220" height="20" fill="#8a2f2f"/>
  <text x="910" y="498" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="700" fill="#fff">Recover</text>
  <text x="910" y="538" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#5b1717">abort · retry</text>
  <text x="910" y="562" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#5b1717">conflict handling</text>
  <text x="910" y="592" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#c04040" font-style="italic">recipes 19–20</text>

  <!-- ── Connecting arrows from top to bottom row ── -->

  <!-- Connect (390,292) → Expose top (330,468) -->
  <path d="M 390 292 L 390 380 L 330 380 L 330 468" stroke="#32261f" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <rect x="312" y="348" width="76" height="22" rx="8" fill="#fffaf2" stroke="#d1c1ac" stroke-width="1"/>
  <text x="350" y="363" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#32261f">web apps</text>

  <!-- Persist bottom (640,292) → Measure top (620,468) -->
  <path d="M 640 292 L 640 412 L 620 412 L 620 468" stroke="#32261f" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <rect x="648" y="362" width="42" height="22" rx="8" fill="#fffaf2" stroke="#d1c1ac" stroke-width="1"/>
  <text x="669" y="377" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#32261f">perf</text>

  <!-- Share bottom (890,292) → Recover top (910,468) -->
  <path d="M 890 292 L 890 380 L 910 380 L 910 468" stroke="#32261f" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <rect x="918" y="356" width="60" height="22" rx="8" fill="#fffaf2" stroke="#d1c1ac" stroke-width="1"/>
  <text x="948" y="371" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#32261f">conflicts</text>

  <!-- ── Recipe 21 at bottom: "Explain" ── -->
  <rect x="430" y="690" width="440" height="110" rx="20" fill="#f0f8ff" stroke="#5580aa" stroke-width="2.5" filter="url(#drop)"/>
  <text x="650" y="730" text-anchor="middle" font-family="Georgia, serif" font-size="20" font-weight="700" fill="#2d4f6b">Recipe 21: Explain gemstone-py</text>
  <text x="650" y="760" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#4a6880">to a new teammate in one sentence</text>
  <text x="650" y="787" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#5580aa" font-style="italic">"A Python bridge to an industrial-strength Smalltalk object database."</text>

  <!-- Arrow from Expose/Recover to Recipe 21 -->
  <path d="M 330 612 L 330 660 L 430 700" stroke="#5580aa" stroke-width="1.8" fill="none" stroke-dasharray="5,4" marker-end="url(#arr)"/>
  <path d="M 910 612 L 910 660 L 870 700" stroke="#5580aa" stroke-width="1.8" fill="none" stroke-dasharray="5,4" marker-end="url(#arr)"/>

  <!-- ── Legend ── -->
  <text x="50" y="820" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#32261f">Reading order:</text>
  <text x="50" y="844" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#32261f">Follow the top row left to right for the main happy path, then drop down as your use case demands.</text>
</svg>
