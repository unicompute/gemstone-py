<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="996" viewBox="0 0 1200 996">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fdfaf4"/>
      <stop offset="1" stop-color="#f3ead8"/>
    </linearGradient>
    <radialGradient id="centreGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#e8f4ff"/>
      <stop offset="1" stop-color="#c8ddf5"/>
    </radialGradient>
    <filter id="drop" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#31261f" flood-opacity="0.14"/>
    </filter>
    <marker id="arr" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 1 L11 6 L0 11 Z" fill="#31261f"/>
    </marker>
  </defs>

  <rect width="1200" height="996" fill="url(#bgGrad)"/>

  <!-- All content shifted down 36px for top margin -->
  <g transform="translate(0 36)">

  <!-- Title -->
  <text x="600" y="62" text-anchor="middle" font-family="Georgia, serif" font-size="34" font-weight="700" fill="#31261f">Map of the Examples Directory</text>
  <text x="600" y="96" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#6c5b4f">Start in the centre, then wander toward the demo that matches your appetite.</text>

  <!-- ── Centre circle ── cx=600 cy=450 r=110 -->
  <circle cx="600" cy="450" r="110" fill="url(#centreGrad)" stroke="#255f88" stroke-width="4" filter="url(#drop)"/>
  <text x="600" y="437" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="26" font-weight="700" fill="#17344f">examples/</text>
  <text x="600" y="464" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#17344f">tour starts here</text>
  <text x="600" y="487" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#4a7ab5" font-style="italic">example.py first</text>

  <!-- ── Top-left: example.py  x=60..380, y=100..270  cx=220,cy=185 ── -->
  <rect x="60" y="118" width="320" height="170" rx="20" fill="#ffe7cc" stroke="#9b5f1e" stroke-width="3" filter="url(#drop)"/>
  <rect x="60" y="118" width="320" height="42" rx="20" fill="#9b5f1e"/>
  <rect x="60" y="138" width="320" height="22" fill="#9b5f1e"/>
  <text x="220" y="148" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#fff">example.py</text>
  <text x="220" y="188" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#5b3410">grand tour: sessions · roots</text>
  <text x="220" y="211" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#5b3410">logs · collections · conflicts</text>
  <text x="220" y="234" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#5b3410">locks · benchmarks</text>
  <text x="220" y="272" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#c47a30" font-style="italic">start here for the full picture</text>

  <!-- ── Top-right: misc/  x=820..1140, y=100..270  cx=980,cy=185 ── -->
  <rect x="820" y="118" width="320" height="170" rx="20" fill="#ffe7cc" stroke="#9b5f1e" stroke-width="3" filter="url(#drop)"/>
  <rect x="820" y="118" width="320" height="42" rx="20" fill="#9b5f1e"/>
  <rect x="820" y="138" width="320" height="22" fill="#9b5f1e"/>
  <text x="980" y="148" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#fff">misc/</text>
  <text x="980" y="188" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#5b3410">smalltalk_demo.py</text>
  <text x="980" y="211" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#5b3410">tiny CLI demos</text>
  <text x="980" y="234" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#5b3410">low pressure on-ramp</text>
  <text x="980" y="272" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#c47a30" font-style="italic">good for first contact</text>

  <!-- ── Bottom-left: persistence/  x=40..390, y=620..800  cx=215,cy=710 ── -->
  <rect x="40" y="620" width="350" height="180" rx="20" fill="#e1f6df" stroke="#2c6b3e" stroke-width="3" filter="url(#drop)"/>
  <rect x="40" y="620" width="350" height="42" rx="20" fill="#2c6b3e"/>
  <rect x="40" y="640" width="350" height="22" fill="#2c6b3e"/>
  <text x="215" y="650" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#fff">persistence/</text>
  <text x="215" y="692" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#1b4829">GSCollection · GStore</text>
  <text x="215" y="716" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#1b4829">ObjectLog · migrations</text>
  <text x="215" y="740" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#1b4829">hat tricks · indexing</text>
  <text x="215" y="782" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#3a8050" font-style="italic">persistence-focused study path</text>

  <!-- ── Bottom-right: flask/  x=810..1160, y=620..800  cx=985,cy=710 ── -->
  <rect x="810" y="620" width="350" height="180" rx="20" fill="#eadfff" stroke="#56337f" stroke-width="3" filter="url(#drop)"/>
  <rect x="810" y="620" width="350" height="42" rx="20" fill="#56337f"/>
  <rect x="810" y="640" width="350" height="22" fill="#56337f"/>
  <text x="985" y="650" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#fff">flask/</text>
  <text x="985" y="692" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#3b2554">simple_blog · magtag</text>
  <text x="985" y="716" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#3b2554">sessions · sinatra ports</text>
  <text x="985" y="740" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#3b2554">request lifecycle demos</text>
  <text x="985" y="782" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#7a52a0" font-style="italic">web-developer study path</text>

  <!-- ── Bottom-centre: django/ and webstack/  x=430..770, y=680..810  cx=600,cy=745 ── -->
  <rect x="430" y="680" width="340" height="130" rx="20" fill="#ffe3e3" stroke="#8a2f2f" stroke-width="3" filter="url(#drop)"/>
  <rect x="430" y="680" width="340" height="42" rx="20" fill="#8a2f2f"/>
  <rect x="430" y="700" width="340" height="22" fill="#8a2f2f"/>
  <text x="600" y="710" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#fff">django/ and webstack/</text>
  <text x="600" y="752" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#5b1717">full app translations</text>
  <text x="600" y="776" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#5b1717">and route demos</text>
  <text x="600" y="800" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#c04040" font-style="italic">broader framework compat</text>

  <!-- ── Arrows from centre circle ── -->

  <!-- → example.py  circle boundary at ~(506,390) → box bottom-right (380,270) -->
  <line x1="508" y1="393" x2="382" y2="290" stroke="#31261f" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- → misc/  circle boundary at ~(694,390) → box bottom-left (820,270) -->
  <line x1="693" y1="393" x2="819" y2="290" stroke="#31261f" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- → persistence/  circle boundary at ~(508,508) → box top-right (390,620) -->
  <line x1="508" y1="507" x2="392" y2="619" stroke="#31261f" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- → flask/  circle boundary at ~(693,508) → box top-left (810,620) -->
  <line x1="693" y1="507" x2="809" y2="619" stroke="#31261f" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- → django/  circle bottom (600,560) → box top (600,678) -->
  <line x1="600" y1="562" x2="600" y2="678" stroke="#31261f" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- ── Study path footer ── -->
  <rect x="50" y="845" width="1100" height="38" rx="12" fill="#f8f4ec" stroke="#c8b89e" stroke-width="1.5"/>
  <text x="600" y="869" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#6c5b4f">Suggested paths: new user → example.py → misc/ · persistence-focused → persistence/ · web dev → flask/ · operations → django/ + benchmarks</text>

  </g>
</svg>
