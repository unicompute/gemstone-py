<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="860" viewBox="0 0 1200 860">
  <rect width="1200" height="860" fill="#f7f2ea"/>
  <text x="60" y="70" font-family="Georgia, serif" font-size="34" fill="#31261f">Map of the Examples Directory</text>
  <text x="60" y="104" font-family="Georgia, serif" font-size="18" fill="#6c5b4f">Start in the center, then wander toward the demos that match your appetite for persistence, web apps, or controlled chaos.</text>

  <circle cx="600" cy="425" r="105" fill="#dceeff" stroke="#255f88" stroke-width="4"/>
  <text x="522" y="410" font-family="Helvetica, Arial, sans-serif" font-size="30" fill="#17344f">examples/</text>
  <text x="515" y="445" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#17344f">tour starts here</text>

  <g font-family="Helvetica, Arial, sans-serif">
    <rect x="120" y="130" width="260" height="120" rx="20" fill="#ffe7cc" stroke="#9b5f1e" stroke-width="3"/>
    <text x="160" y="180" font-size="28" fill="#5b3410">example.py</text>
    <text x="145" y="212" font-size="18" fill="#5b3410">grand tour of sessions, roots, logs,</text>
    <text x="145" y="238" font-size="18" fill="#5b3410">collections, conflicts, and locks</text>

    <rect x="815" y="130" width="270" height="120" rx="20" fill="#ffe7cc" stroke="#9b5f1e" stroke-width="3"/>
    <text x="845" y="180" font-size="28" fill="#5b3410">misc/</text>
    <text x="840" y="212" font-size="18" fill="#5b3410">smalltalk_demo.py and tiny CLI demos</text>
    <text x="840" y="238" font-size="18" fill="#5b3410">good for first contact</text>

    <rect x="80" y="620" width="280" height="130" rx="20" fill="#e1f6df" stroke="#2c6b3e" stroke-width="3"/>
    <text x="120" y="674" font-size="28" fill="#1b4829">persistence/</text>
    <text x="110" y="706" font-size="18" fill="#1b4829">GSCollection, GStore, migrations,</text>
    <text x="110" y="732" font-size="18" fill="#1b4829">KD trees, hat tricks, indexing</text>

    <rect x="820" y="620" width="280" height="130" rx="20" fill="#eadfff" stroke="#56337f" stroke-width="3"/>
    <text x="885" y="674" font-size="28" fill="#3b2554">flask/</text>
    <text x="850" y="706" font-size="18" fill="#3b2554">simple_blog, magtag, sessions,</text>
    <text x="850" y="732" font-size="18" fill="#3b2554">sinatra ports, request handling</text>

    <rect x="460" y="675" width="280" height="110" rx="20" fill="#ffe3e3" stroke="#8a2f2f" stroke-width="3"/>
    <text x="525" y="720" font-size="28" fill="#5b1717">django/ and webstack/</text>
    <text x="505" y="752" font-size="18" fill="#5b1717">full app translations and route demos</text>
  </g>

  <path d="M526 341 L320 250" stroke="#31261f" stroke-width="6" fill="none" marker-end="url(#arrow)"/>
  <path d="M675 341 L855 250" stroke="#31261f" stroke-width="6" fill="none" marker-end="url(#arrow)"/>
  <path d="M500 520 L310 620" stroke="#31261f" stroke-width="6" fill="none" marker-end="url(#arrow)"/>
  <path d="M700 520 L860 620" stroke="#31261f" stroke-width="6" fill="none" marker-end="url(#arrow)"/>
  <path d="M600 530 L600 675" stroke="#31261f" stroke-width="6" fill="none" marker-end="url(#arrow)"/>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#31261f"/>
    </marker>
  </defs>
</svg>
