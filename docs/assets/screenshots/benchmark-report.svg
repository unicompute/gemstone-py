<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="780" viewBox="0 0 1280 780">
  <rect width="1280" height="780" fill="#f0efe9"/>
  <rect x="30" y="30" width="1220" height="720" rx="22" fill="#ffffff" stroke="#cfc8bb" stroke-width="3"/>
  <text x="60" y="78" font-family="Helvetica, Arial, sans-serif" font-size="34" fill="#2d3436">Benchmark Report (Illustrative)</text>

  <g font-family="Menlo, Consolas, monospace" font-size="20">
    <rect x="70" y="120" width="1140" height="70" rx="12" fill="#22313f"/>
    <text x="100" y="165" fill="#f8f9fa">suite            operation                      ops/s    delta</text>

    <rect x="70" y="215" width="1140" height="55" rx="10" fill="#eef8ef"/>
    <text x="100" y="250" fill="#215732">persistent_root  mapping_keys                327100.4   +1.1%</text>

    <rect x="70" y="290" width="1140" height="55" rx="10" fill="#eef8ef"/>
    <text x="100" y="325" fill="#215732">gscollection     indexed_search                687.4    -4.8%</text>

    <rect x="70" y="365" width="1140" height="55" rx="10" fill="#fff7e6"/>
    <text x="100" y="400" fill="#7a5400">gstore           snapshot_read                2401.9   -17.3%</text>

    <rect x="70" y="440" width="1140" height="55" rx="10" fill="#eef8ef"/>
    <text x="100" y="475" fill="#215732">rchash           items                       31245.0    -6.4%</text>
  </g>

  <text x="70" y="565" font-family="Georgia, serif" font-size="24" fill="#2d3436">The benchmark workflow can compare reports, enforce thresholds,</text>
  <text x="70" y="596" font-family="Georgia, serif" font-size="24" fill="#2d3436">and upload JSON artifacts.</text>
  <text x="70" y="640" font-family="Georgia, serif" font-size="20" fill="#5c6166">That means performance discussions can happen with evidence</text>
  <text x="70" y="668" font-family="Georgia, serif" font-size="20" fill="#5c6166">instead of dramatic hand gestures.</text>
</svg>
