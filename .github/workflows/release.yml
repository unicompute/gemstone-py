name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish-to-pypi:
        description: Set to true to publish built artifacts to PyPI
        required: true
        default: "false"
      release-tag:
        description: Optional release tag to validate for manual runs (required when publish-to-pypi=true)
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.11"

      - name: Install package and dev tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Resolve release tag context
        id: release_context
        shell: bash
        env:
          WORKFLOW_RELEASE_TAG: ${{ github.event.inputs['release-tag'] }}
          WORKFLOW_PUBLISH_TO_PYPI: ${{ github.event.inputs['publish-to-pypi'] }}
        run: |
          release_tag=""
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            release_tag="${GITHUB_REF_NAME}"
          elif [[ "${WORKFLOW_PUBLISH_TO_PYPI}" == "true" ]]; then
            if [[ -z "${WORKFLOW_RELEASE_TAG}" ]]; then
              echo "Manual PyPI publish requires the release-tag input." >&2
              exit 1
            fi
            release_tag="${WORKFLOW_RELEASE_TAG}"
          else
            release_tag="${WORKFLOW_RELEASE_TAG}"
          fi
          echo "release_tag=${release_tag}" >> "${GITHUB_OUTPUT}"

      - name: Validate release metadata
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.release_context.outputs.release_tag }}
        run: |
          args=()
          if [[ -n "${RELEASE_TAG}" ]]; then
            args+=(--tag "${RELEASE_TAG}")
          fi
          python -m gemstone_py.release_metadata "${args[@]}"

      - name: Run release verification lane
        run: ./scripts/run_ci_checks.sh

      - name: Build release artifacts
        run: python -m build --sdist --wheel

      - name: Upload release artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: gemstone-py-release-dist
          path: dist/*
          if-no-files-found: error

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          files: dist/*
          generate_release_notes: true

  publish-pypi:
    needs: build-release
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs['publish-to-pypi'] == 'true'
    permissions:
      id-token: write
    environment:
      name: pypi
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: gemstone-py-release-dist
          path: dist

      - name: Publish to PyPI with trusted publishing
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
