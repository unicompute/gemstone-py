name: Live GemStone Tests

on:
  workflow_dispatch:
    inputs:
      runner-labels:
        description: JSON array of runner labels for the GemStone host
        required: true
        default: '["self-hosted","macOS","ARM64","gemstone-py-local"]'
      run-soak:
        description: Set to true to include the longer live soak tests
        required: true
        default: "false"

permissions:
  contents: read

jobs:
  live:
    runs-on: ${{ fromJson(inputs.runner-labels) }}
    env:
      RUNNER_TOOL_CACHE: /Users/tariq/src/actions-runner-gemstone-py/hostedtoolcache
      AGENT_TOOLSDIRECTORY: /Users/tariq/src/actions-runner-gemstone-py/hostedtoolcache
      GS_LIB: ${{ secrets.GS_LIB != '' && secrets.GS_LIB || '/Users/tariq/GemStone64Bit3.7.5-arm64.Darwin/lib' }}
      GS_LIB_PATH: ${{ secrets.GS_LIB_PATH != '' && secrets.GS_LIB_PATH || '/Users/tariq/GemStone64Bit3.7.5-arm64.Darwin/lib/libgcirpc-3.7.5-64.dylib' }}
      GS_STONE: ${{ secrets.GS_STONE != '' && secrets.GS_STONE || 'gs64stone' }}
      GS_HOST: ${{ secrets.GS_HOST != '' && secrets.GS_HOST || 'localhost' }}
      GS_NETLDI: ${{ secrets.GS_NETLDI != '' && secrets.GS_NETLDI || 'netldi' }}
      GS_GEM_SERVICE: ${{ secrets.GS_GEM_SERVICE != '' && secrets.GS_GEM_SERVICE || 'gemnetobject' }}
      GS_USERNAME: ${{ secrets.GS_USERNAME }}
      GS_PASSWORD: ${{ secrets.GS_PASSWORD }}
      GS_HOST_USERNAME: ${{ secrets.GS_HOST_USERNAME }}
      GS_HOST_PASSWORD: ${{ secrets.GS_HOST_PASSWORD }}
      GS_RUN_LIVE: "1"
      GS_RUN_LIVE_SOAK: ${{ inputs.run-soak == 'true' && '1' || '0' }}
      PYTHON_BIN: python3
    steps:
      - uses: actions/checkout@v6

      - name: Validate live test configuration
        run: |
          "${PYTHON_BIN}" --version
          test -n "${GS_USERNAME}" || { echo "Missing GS_USERNAME secret"; exit 1; }
          test -n "${GS_PASSWORD}" || { echo "Missing GS_PASSWORD secret"; exit 1; }
          test -n "${GS_STONE}" || { echo "Missing GS_STONE secret"; exit 1; }

      - name: Install package and dev tools
        run: |
          "${PYTHON_BIN}" -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Run live GemStone tests
        run: ./scripts/run_live_checks.sh
