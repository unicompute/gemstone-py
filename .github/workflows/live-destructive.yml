name: Destructive Live GemStone Tests

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: Type DESTROY to run destructive live tests
        required: true
        default: "no"

permissions:
  contents: read

jobs:
  destructive-live:
    runs-on: ubuntu-latest
    env:
      GS_LIB: ${{ secrets.GS_LIB }}
      GS_LIB_PATH: ${{ secrets.GS_LIB_PATH }}
      GS_STONE: ${{ secrets.GS_STONE }}
      GS_HOST: ${{ secrets.GS_HOST }}
      GS_NETLDI: ${{ secrets.GS_NETLDI }}
      GS_GEM_SERVICE: ${{ secrets.GS_GEM_SERVICE }}
      GS_USERNAME: ${{ secrets.GS_USERNAME }}
      GS_PASSWORD: ${{ secrets.GS_PASSWORD }}
      GS_HOST_USERNAME: ${{ secrets.GS_HOST_USERNAME }}
      GS_HOST_PASSWORD: ${{ secrets.GS_HOST_PASSWORD }}
      GS_RUN_LIVE: "1"
      GS_RUN_DESTRUCTIVE_LIVE: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate destructive live configuration
        env:
          CONFIRM_DESTRUCTIVE: ${{ inputs.confirm }}
        run: |
          test -n "${GS_USERNAME}" || { echo "Missing GS_USERNAME secret"; exit 1; }
          test -n "${GS_PASSWORD}" || { echo "Missing GS_PASSWORD secret"; exit 1; }
          test -n "${GS_STONE}" || { echo "Missing GS_STONE secret"; exit 1; }
          test "${CONFIRM_DESTRUCTIVE}" = "DESTROY" || {
            echo "Refusing to run destructive live tests without confirm=DESTROY"
            exit 1
          }

      - name: Install package and dev tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Run destructive live GemStone tests
        run: ./scripts/run_live_checks.sh
