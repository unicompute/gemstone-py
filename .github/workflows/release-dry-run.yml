name: Release Dry Run

on:
  workflow_dispatch:
    inputs:
      release-tag:
        description: Optional release tag to validate against project.version
        required: false
        default: ""

permissions:
  contents: read

jobs:
  dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.11"

      - name: Install package and dev tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Validate release metadata
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event.inputs['release-tag'] }}
        run: |
          args=()
          if [[ -n "${RELEASE_TAG}" ]]; then
            args+=(--tag "${RELEASE_TAG}")
          fi
          python -m gemstone_py.release_metadata "${args[@]}"

      - name: Run release verification lane
        run: ./scripts/run_ci_checks.sh

      - name: Build release artifacts
        run: python -m build --sdist --wheel

      - name: Upload dry-run artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: gemstone-py-release-dry-run-dist
          path: dist/*
          if-no-files-found: error
